services:
  - type: web
    name: resume-agent-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
